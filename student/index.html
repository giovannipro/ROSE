<!DOCTYPE HTML>
<html lang="en">

<head>
	<title>ROSE project</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
	<link rel="stylesheet" type="text/css" href="../assets/style/style.css">
	<link rel="stylesheet" type="text/css" href="assets/style/style.css">
</head>

<body>
	<main>
		<div id="controllers">
			<div id="header">
				<h2> 
					<span id="t_user" style="font-weight: bold;">User</span>:
					<span id="the_user"></span>
				</h2>
				<h2> 
					<span id="t_task" style="font-weight: bold;">Task</span>:
					<span id="the_task"></span></h2>
			</div>
			<div>
				<button class="button not_active" id="normalize_size">
					<span id="t_normalize_scale">Normalize scale</span>
				</button>
				<button class="button" id="fit_size">
					<span id="t_fit_scale">Fit scale</span>
				</button>
			</div>
		</div>

		<div id="container">
			<div id="chart">
				<div id="label_box"></div>
				<div id="plot_box"></div>
			</div>
			<div id="infobox"></div>
		</div>

		<div style="display: flex; justify-content: flex-end;">
			<button class="button" id="legend_switch" style="border: 1px solid #C8C8C8; margin: 1rem;">
				<span id="t_showHide_legend">Show legend</span>
			</button>
		</div>
		<div id="legend" style="border-top: 1px solid #bfbfbf">
			<div id="legend_box_a" class="legend_box">
				<p>Search</p>
				<div id="legend_a"></div>
			</div>
			<div id="legend_box_b" class="legend_box">
				<p>Pages</p>
				<div id="legend_b"></div>
			</div>
		</div>

		<div id="stat_hints">
			<div id="statistics" class="main_tab">
				<div id="stat_txt" class="tab_label">
					<span id="t_statistics">Statistics</span>
					<span class="open_tab" id="open_stat">&darr;</span>
					<!-- &darr; &uarr; -->
				</div>
				<div id="statistics_container">
					<div class="tab_content">
						<div id="statistics_a" class="statistics_box"></div>
						<div id="statistics_b" class="statistics_box"></div>
						<div id="statistics_c" class="statistics_box"></div>
					</div>
				</div>
			</div>
	
			<div id="suggestions" class="main_tab">
				<div id="sugg_txt" class="tab_label">
					<span id="t_suggestions">
						Suggestions
					</span>
					<span class="open_tab" id="open_sugg">&darr;</span>
				</div>
				<div id="suggestions_container">
					<div class="tab_content">
						<!-- <span style="color: #ababab"><em>Some suggestions here</em></span> -->
						<div id="hints" class="hints_box"></div>
					</div>
				</div>
			</div>
		</div>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
	<script src="https://unpkg.com/i18next@25.0.0/dist/umd/i18next.min.js"></script>
	<script src="../assets/script/utilities.js" defer></script>
	<script src="assets/script/hints.js" defer></script>
	<script src="assets/script/statistics.js" defer></script>
	<script src="assets/script/script.js" defer></script>
	<script src="../assets/script/multilanguage_student.js" defer></script>
</body>

</html>
