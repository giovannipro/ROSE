<!DOCTYPE HTML>
<html lang="en">

<head>
	<title>ROSE project | Class</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
	<link rel="stylesheet" type="text/css" href="../assets/style/style.css">
	<link rel="stylesheet" type="text/css" href="assets/style/style.css">
</head>

<body>
	<main>
		<div id="controllers">
			<div id="header">
				<h2> 
					<span id="t_class" style="font-weight: bold;">Class</span>:
					<span id="the_class"></span>
				</h2>
				<h2> 
					<span id="t_task" style="font-weight: bold;">Task</span>:
					<span id="the_task"></span>
				</h2>
				<h2> 
					<span id="t_date" style="font-weight: bold;">Date</span>:
					<span id="the_date"></span>
				</h2>
			</div>
		</div>

		<section id="class_box">
			<aside>
				<div id="sort_box">
					<span>
						<span id="n_stories">0</span>
						<span id="t_stories">stories</span>
					</span>
					<div>
						<span style="font-size: 0.8rem; margin-right: 0.5rem;" id="t_sortBy">sort by</span>
						<select id="get_sort">
							<option value="total" id="t_totalTime">total time</option>
							<option value="queries" id="t_searchTime">search time</option>
							<option value="pages" id="t_pagesTime">pages time</option>
							<option value="name" id="t_name">name</option>
						</select>
					</div>
				</div>
				<ul id="student_list"></ul>
			</aside>
			<div id="container"></div>
		</section>

		<section id="stat_hints">
			<div id="statistics" class="main_tab">
				<div id="stat_txt" class="tab_label">
					<span id="t_searchPages">Ricerche e pagine</span>
					<span class="open_tab" id="open_stat">&darr;</span>
				</div>
				<div id="statistics_container">
					<div class="tab_content">
						<div id="statistics_a" class="statistics_box"></div>
						<div id="statistics_b" class="statistics_box"></div>
						<div id="statistics_c" class="statistics_box"></div>
					</div>
				</div>
			</div>
		</section>

	<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
	<script src="https://unpkg.com/i18next@25.0.0/dist/umd/i18next.min.js"></script>
	<script src="../assets/script/utilities.js" defer></script>
	<script src="assets/script/class.js" defer></script>
	<script src="../assets/script/multilanguage_class.js" defer></script>
</body>

</html>
